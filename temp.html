<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>温度换算</title>
    <link rel="stylesheet" href="style.css?v=20260329-9">
</head>
<body>
    <main class="shell">
        <a class="back-link" href="./index.html?v=20260329-9">返回功能首页</a>
        <section class="hero">
            <p class="eyebrow">表 B.1</p>
            <h1>温度换算</h1>
            <p class="intro">输入蒸馏后酒样的酒精计读数和测量温度，换算成 20℃ 标准酒精度。</p>
            <p class="range" id="range-text">正在读取支持范围…</p>
        </section>

        <section class="tool-panel">
            <div class="calculator-card">
                <div class="grid-two">
                    <div class="form-group">
                        <label for="temp-input">测量温度</label>
                        <div class="input-row">
                            <input type="number" id="temp-input" step="0.1" inputmode="decimal" placeholder="例如 24.5">
                            <span class="unit">℃</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="alcohol-input">酒精计读数</label>
                        <div class="input-row">
                            <input type="number" id="alcohol-input" step="0.1" inputmode="decimal" placeholder="例如 10.8">
                            <span class="unit">%vol</span>
                        </div>
                    </div>
                </div>

                <button class="btn-primary" type="button" onclick="runTempCalculator()">换算到 20℃</button>

                <div class="examples">
                    <span>快速示例</span>
                    <button type="button" onclick="fillTempExample(24.5, 10.8)">24.5℃ / 10.8</button>
                    <button type="button" onclick="fillTempExample(15.5, 52.3)">15.5℃ / 52.3</button>
                </div>

                <div class="result-card" id="temp-result">
                    <p class="result-status">换算结果</p>
                    <p class="result-output">等待输入</p>
                    <p class="result-detail">输入温度和酒精计读数后，这里会显示 20℃ 标准酒精度。</p>
                </div>
            </div>
        </section>
    </main>

    <script src="data.js?v=20260329-10"></script>
    <script>
        (function () {
            function formatNumber(value, digits) {
                return Number(value).toFixed(digits);
            }

            const correctionTable = tempCorrectionTable;
            const sortedTemperatures = Object.keys(correctionTable).map(Number).sort((a, b) => a - b);

            function getAlcoholsForTemperature(temp) {
                return Object.keys(correctionTable[temp] || {}).map(Number).sort((a, b) => a - b);
            }

            function findNeighborBounds(sortedValues, target) {
                if (!sortedValues.length) return null;
                if (target < sortedValues[0] || target > sortedValues[sortedValues.length - 1]) return null;
                if (sortedValues.includes(target)) return { lower: target, upper: target };
                for (let i = 0; i < sortedValues.length - 1; i += 1) {
                    const lower = sortedValues[i];
                    const upper = sortedValues[i + 1];
                    if (target >= lower && target <= upper) {
                        return { lower, upper };
                    }
                }
                return null;
            }

            function linearInterpolate(x, x0, x1, y0, y1) {
                if (x0 === x1) return y0;
                return y0 + ((x - x0) * (y1 - y0)) / (x1 - x0);
            }

            function getAlcoholBoundsForTemperature(temp, alcohol) {
                return findNeighborBounds(getAlcoholsForTemperature(temp), alcohol);
            }

            function hasValue(temp, alcohol) {
                return correctionTable[temp] !== undefined && correctionTable[temp][alcohol] !== undefined;
            }

            function buildBounds(tempLower, tempUpper, alcohol) {
                const lowerBounds = getAlcoholBoundsForTemperature(tempLower, alcohol);
                const upperBounds = getAlcoholBoundsForTemperature(tempUpper, alcohol);
                if (!lowerBounds || !upperBounds) return null;

                const alcoholLower = Math.max(lowerBounds.lower, upperBounds.lower);
                const alcoholUpper = Math.min(lowerBounds.upper, upperBounds.upper);
                if (alcoholLower > alcohol || alcoholUpper < alcohol) return null;
                if (!hasValue(tempLower, alcoholLower) || !hasValue(tempUpper, alcoholLower)) return null;
                if (!hasValue(tempLower, alcoholUpper) || !hasValue(tempUpper, alcoholUpper)) return null;

                return { tempLower, tempUpper, alcoholLower, alcoholUpper };
            }

            function getCorrectionBounds(temp, alcohol) {
                if (temp < sortedTemperatures[0] || temp > sortedTemperatures[sortedTemperatures.length - 1]) {
                    return null;
                }

                const exactAlcoholBounds = correctionTable[temp]
                    ? getAlcoholBoundsForTemperature(temp, alcohol)
                    : null;
                if (exactAlcoholBounds) {
                    return {
                        tempLower: temp,
                        tempUpper: temp,
                        alcoholLower: exactAlcoholBounds.lower,
                        alcoholUpper: exactAlcoholBounds.upper,
                    };
                }

                const lowerCandidates = sortedTemperatures.filter((value) => value <= temp).reverse();
                const upperCandidates = sortedTemperatures.filter((value) => value >= temp);

                for (const tempLower of lowerCandidates) {
                    for (const tempUpper of upperCandidates) {
                        if (tempLower > temp || tempUpper < temp || tempLower > tempUpper) continue;
                        const bounds = buildBounds(tempLower, tempUpper, alcohol);
                        if (bounds) return bounds;
                    }
                }

                return null;
            }

            function explainCorrection(temp, alcohol) {
                const bounds = getCorrectionBounds(temp, alcohol);
                if (!bounds) return null;
                const points = [
                    {
                        temp: bounds.tempLower,
                        alcohol: bounds.alcoholLower,
                        value: correctionTable[bounds.tempLower][bounds.alcoholLower],
                    },
                ];
                if (bounds.alcoholUpper !== bounds.alcoholLower) {
                    points.push({
                        temp: bounds.tempLower,
                        alcohol: bounds.alcoholUpper,
                        value: correctionTable[bounds.tempLower][bounds.alcoholUpper],
                    });
                }
                if (bounds.tempUpper !== bounds.tempLower) {
                    points.push({
                        temp: bounds.tempUpper,
                        alcohol: bounds.alcoholLower,
                        value: correctionTable[bounds.tempUpper][bounds.alcoholLower],
                    });
                }
                if (bounds.tempUpper !== bounds.tempLower && bounds.alcoholUpper !== bounds.alcoholLower) {
                    points.push({
                        temp: bounds.tempUpper,
                        alcohol: bounds.alcoholUpper,
                        value: correctionTable[bounds.tempUpper][bounds.alcoholUpper],
                    });
                }
                return { bounds, points };
            }

            function correctTemperature(temp, alcohol) {
                const bounds = getCorrectionBounds(temp, alcohol);
                if (!bounds) return null;

                const { tempLower, tempUpper, alcoholLower, alcoholUpper } = bounds;
                const read = (t, a) => correctionTable[t][a];

                if (tempLower === tempUpper && alcoholLower === alcoholUpper) {
                    return read(tempLower, alcoholLower);
                }
                if (tempLower === tempUpper) {
                    return linearInterpolate(alcohol, alcoholLower, alcoholUpper, read(tempLower, alcoholLower), read(tempLower, alcoholUpper));
                }
                if (alcoholLower === alcoholUpper) {
                    return linearInterpolate(temp, tempLower, tempUpper, read(tempLower, alcoholLower), read(tempUpper, alcoholLower));
                }

                const lowerTempValue = linearInterpolate(alcohol, alcoholLower, alcoholUpper, read(tempLower, alcoholLower), read(tempLower, alcoholUpper));
                const upperTempValue = linearInterpolate(alcohol, alcoholLower, alcoholUpper, read(tempUpper, alcoholLower), read(tempUpper, alcoholUpper));
                return linearInterpolate(temp, tempLower, tempUpper, lowerTempValue, upperTempValue);
            }

            function showResult(kind, title, detail, extra) {
                const result = document.getElementById("temp-result");
                result.className = "result-card show " + kind;
                result.innerHTML = `
                    <p class="result-status">${kind === "error" ? "无法计算" : "换算结果"}</p>
                    <p class="result-output">${title}</p>
                    <p class="result-detail">${detail}</p>
                    ${extra ? `<div class="result-basis">${extra}</div>` : ""}
                `;
            }

            window.runTempCalculator = function () {
                const temp = Number.parseFloat(document.getElementById("temp-input").value);
                const alcohol = Number.parseFloat(document.getElementById("alcohol-input").value);

                if (Number.isNaN(temp) || Number.isNaN(alcohol)) {
                    showResult("error", "请输入有效数字", "温度和酒精计读数都支持输入小数，例如 24.5 和 10.8。");
                    return;
                }

                const result = correctTemperature(temp, alcohol);
                if (result === null) {
                    showResult(
                        "error",
                        "当前输入超出可换算范围",
                        `支持温度 ${sortedTemperatures[0]}℃-${sortedTemperatures[sortedTemperatures.length - 1]}℃。`
                    );
                    return;
                }

                const explanation = explainCorrection(temp, alcohol);
                const extra = explanation
                    ? [
                        "<strong>参考表值：</strong>",
                        ...explanation.points.map((point) => `${formatNumber(point.temp, 1)}℃ / ${formatNumber(point.alcohol, 1)}%vol -> ${formatNumber(point.value, 2)}`),
                    ].filter(Boolean).join("<br>")
                    : "";

                showResult(
                    "success",
                    `${formatNumber(result, 2)} %vol`,
                    `输入 ${formatNumber(temp, 1)}℃ / ${formatNumber(alcohol, 1)}%vol，折算为 20℃ 标准酒精度。`,
                    extra
                );
            };

            window.fillTempExample = function (temp, alcohol) {
                document.getElementById("temp-input").value = temp;
                document.getElementById("alcohol-input").value = alcohol;
                window.runTempCalculator();
            };

            document.getElementById("range-text").textContent = `支持范围：温度 ${sortedTemperatures[0]}℃-${sortedTemperatures[sortedTemperatures.length - 1]}℃，酒精计读数按表 B.1 插值换算。`;
        })();
    </script>
</body>
</html>
