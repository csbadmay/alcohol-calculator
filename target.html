<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>目标反推</title>
    <link rel="stylesheet" href="style.css?v=20260329-11">
</head>
<body>
    <main class="shell">
        <a class="back-link" href="./index.html?v=20260329-11">返回功能首页</a>
        <section class="hero">
            <p class="eyebrow">表 A.1</p>
            <h1>目标反推</h1>
            <p class="intro">已知两种原酒酒度、目标酒度和目标数量，反推各自需要多少。</p>
        </section>

        <section class="tool-panel">
            <div class="calculator-card">
                <div class="grid-two">
                    <div class="form-group">
                        <label for="target-source-a">原酒 A 酒度</label>
                        <div class="input-row">
                            <input type="number" id="target-source-a" step="0.1" inputmode="decimal" placeholder="例如 42">
                            <span class="unit">%vol</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="target-source-b">原酒 B 酒度</label>
                        <div class="input-row">
                            <input type="number" id="target-source-b" step="0.1" inputmode="decimal" placeholder="例如 95">
                            <span class="unit">%vol</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="target-alcohol">目标酒度</label>
                        <div class="input-row">
                            <input type="number" id="target-alcohol" step="0.1" inputmode="decimal" placeholder="例如 52">
                            <span class="unit">%vol</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="target-amount">目标数量</label>
                        <div class="input-row">
                            <input type="number" id="target-amount" step="0.001" inputmode="decimal" placeholder="例如 50">
                            <select class="unit-select" id="target-unit">
                                <option value="weight">公斤</option>
                                <option value="volume">升</option>
                            </select>
                        </div>
                    </div>
                </div>

                <button class="btn-primary" type="button" onclick="runTargetCalculator()">反推两种酒用量</button>
                <div class="result-card" id="target-result"></div>
            </div>
        </section>
    </main>

    <script src="data.js?v=20260329-11"></script>
    <script src="target.js?v=20260329-11"></script>
</body>
</html>
