<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>数据录入工具</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        textarea { width: 100%; height: 400px; font-family: monospace; }
        button { padding: 10px 20px; font-size: 16px; margin: 10px 5px; }
    </style>
</head>
<body>
    <h2>附录B数据录入工具</h2>
    <p>请从PDF中复制表格数据，粘贴到下方文本框：</p>
    <textarea id="input" placeholder="粘贴表格数据..."></textarea>
    <button onclick="parseData()">解析数据</button>
    <button onclick="downloadData()">下载 data.js</button>
    <pre id="output"></pre>

    <script>
        let parsedData = {};

        function parseData() {
            const text = document.getElementById('input').value;
            // 这里需要根据实际表格格式编写解析逻辑
            document.getElementById('output').textContent = '数据解析中...';
        }

        function downloadData() {
            const content = 'const tempCorrectionTable = ' + JSON.stringify(parsedData, null, 2) + ';';
            const blob = new Blob([content], { type: 'text/javascript' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'data-new.js';
            a.click();
        }
    </script>
</body>
</html>
