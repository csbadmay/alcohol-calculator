<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>重量体积换算</title>
    <link rel="stylesheet" href="style.css?v=20260329-11">
</head>
<body>
    <main class="shell">
        <a class="back-link" href="./index.html?v=20260329-11">返回功能首页</a>
        <section class="hero">
            <p class="eyebrow">表 A.1</p>
            <h1>重量体积换算</h1>
            <p class="intro">已知酒度和重量或体积，换算另一种单位。</p>
        </section>

        <section class="tool-panel">
            <div class="calculator-card">
                <div class="grid-two">
                    <div class="form-group">
                        <label for="convert-alcohol">酒度</label>
                        <div class="input-row">
                            <input type="number" id="convert-alcohol" step="0.1" inputmode="decimal" placeholder="例如 42">
                            <span class="unit">%vol</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="convert-amount">数量</label>
                        <div class="input-row">
                            <input type="number" id="convert-amount" step="0.001" inputmode="decimal" placeholder="例如 10">
                            <select class="unit-select" id="convert-unit">
                                <option value="weight">公斤</option>
                                <option value="volume">升</option>
                            </select>
                        </div>
                    </div>
                </div>

                <button class="btn-primary" type="button" onclick="runConvertCalculator()">换算</button>
                <div class="result-card" id="convert-result"></div>
            </div>
        </section>
    </main>

    <script src="data.js?v=20260329-11"></script>
    <script src="convert.js?v=20260329-11"></script>
</body>
</html>
